<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberIDS — Security Operations Center</title>
<style>
/* ── Tokens ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #080c10;
  --surface:    #0d1520;
  --surface-hi: #131f2d;
  --border:     #1a2840;
  --text:       #9ab0c8;
  --text-hi:    #d4e4f4;
  --muted:      #4a6880;
  --accent:     #00ff88;
  --accent-dim: rgba(0,255,136,0.07);

  --critical: #ef4444;
  --high:     #f97316;
  --medium:   #eab308;
  --low:      #22c55e;

  --rule-col: #3b82f6;
  --ml-col:   #a855f7;
  --both-col: #10b981;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  font-size: 13px; line-height: 1.5; }

/* Subtle tactical grid overlay */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.016) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* Slow scan-line sweep */
body::after {
  content: '';
  position: fixed; left: 0; right: 0; height: 2px; top: -2px;
  background: linear-gradient(90deg, transparent 0%, rgba(0,255,136,0.15) 50%, transparent 100%);
  animation: scanLine 14s linear infinite;
  pointer-events: none; z-index: 1;
}
@keyframes scanLine { to { top: 100vh; } }

/* ── App shell ───────────────────────────────────────────── */
#app { display: grid; grid-template-rows: 48px 1fr; height: 100vh; position: relative; z-index: 2; }

/* ── Header ──────────────────────────────────────────────── */
header {
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
  background: rgba(8,12,16,0.92); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px); flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 8px;
  font-family: "Courier New", monospace; font-size: 15px; font-weight: 700;
  color: var(--accent); letter-spacing: 3px; text-transform: uppercase; flex-shrink: 0;
}
.logo-glyph { font-size: 19px; opacity: 0.9; }

.h-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

/* Compact stat chips in header */
.h-stats { display: flex; align-items: center; gap: 14px; }

.hstat { display: flex; align-items: baseline; gap: 4px; }
.hstat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
.hstat-val { font-family: "Courier New", monospace; font-size: 19px; font-weight: 700; line-height: 1; }
#hv-total    { color: var(--text-hi); }
#hv-critical { color: var(--critical); }
#hv-high     { color: var(--high); }
#hv-medium   { color: var(--medium); }
#hv-apm      { color: var(--accent); }

/* Live badge */
.live-badge {
  margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  font-family: "Courier New", monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
.live-badge.online  { color: var(--accent); }
.live-badge.offline { color: var(--muted); }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.live-badge.online .live-dot { animation: livePulse 1.8s ease-in-out infinite; }
@keyframes livePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.7); }
  50%      { box-shadow: 0 0 0 5px rgba(0,255,136,0); }
}

/* WS status text */
.ws-status { font-size: 10px; color: var(--muted); font-family: "Courier New", monospace; flex-shrink: 0; }

/* ── Main layout ─────────────────────────────────────────── */
main { display: grid; grid-template-columns: 390px 1fr; overflow: hidden; }

/* ── LEFT COLUMN ─────────────────────────────────────────── */
.col-left { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 5px; padding: 6px 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: rgba(13,21,32,0.7);
}
.filter-lbl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 3px; }
.filter-btn {
  padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700;
  font-family: "Courier New", monospace; letter-spacing: 0.5px; text-transform: uppercase;
  cursor: pointer; border: 1px solid transparent; background: transparent;
  transition: opacity 0.12s; opacity: 0.35;
}
.filter-btn.active { opacity: 1; }
.filter-btn:hover  { opacity: 0.8; }
.fb-all      { color: var(--muted);    border-color: var(--border); }
.fb-CRITICAL { color: var(--critical); border-color: rgba(239,68,68,0.35); }
.fb-HIGH     { color: var(--high);     border-color: rgba(249,115,22,0.35); }
.fb-MEDIUM   { color: var(--medium);   border-color: rgba(234,179,8,0.35); }
.fb-LOW      { color: var(--low);      border-color: rgba(34,197,94,0.35); }
.filter-count { font-size: 9px; color: var(--muted); font-family: "Courier New", monospace; margin-left: auto; }

/* Alert list */
.alert-list { flex: 1; overflow-y: auto; padding: 3px 0; }
.alert-list:focus { outline: none; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 8px; color: var(--muted); font-size: 12px; padding: 32px; text-align: center;
}
.empty-icon { font-size: 30px; opacity: 0.25; margin-bottom: 4px; }

/* ── Alert card ──────────────────────────────────────────── */
.alert-card {
  display: flex; align-items: stretch; cursor: pointer; position: relative;
  transition: background 0.1s; border-bottom: 1px solid rgba(26,40,64,0.45);
}
.alert-card:hover    { background: rgba(255,255,255,0.022); }
.alert-card.selected { background: rgba(0,255,136,0.04); }

/* Left severity bar */
.sev-bar { width: 3px; flex-shrink: 0; }
.sev-bar-CRITICAL { background: var(--critical); }
.sev-bar-HIGH     { background: var(--high); }
.sev-bar-MEDIUM   { background: var(--medium); }
.sev-bar-LOW      { background: var(--low); }

/* CRITICAL cards get a subtle ambient glow */
.alert-card[data-sev="CRITICAL"] { box-shadow: inset 4px 0 16px rgba(239,68,68,0.1); }

/* Card body */
.card-body {
  flex: 1; padding: 7px 12px 7px 10px; min-width: 0;
  display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto auto;
  gap: 2px 8px;
}

/* Row 1 cells */
.card-sev   { grid-column:1; grid-row:1; align-self:center; }
.card-type  { grid-column:2; grid-row:1; align-self:center;
  font-family:"Courier New",monospace; font-size:12px; font-weight:700;
  color:var(--text-hi); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-right { grid-column:3; grid-row:1; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.card-time  { font-family:"Courier New",monospace; font-size:10px; color:var(--muted); }

/* Row 2 */
.card-bottom { grid-column:1/-1; grid-row:2; display:flex; align-items:center; gap:7px; }
.card-ip {
  font-family:"Courier New",monospace; font-size:10px; color:var(--muted);
  cursor:pointer; padding:0 2px; border-radius:2px; transition:color .1s,background .1s;
}
.card-ip:hover { color:var(--accent); background:var(--accent-dim); }
.card-arrow { color:var(--muted); font-size:9px; }
.card-expl { font-size:10px; color:var(--muted); overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; flex:1; min-width:0; opacity:0.6; }

/* New card slide-in */
@keyframes cardIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-new { animation: cardIn 0.22s ease-out forwards; }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display:inline-block; padding:1px 6px; border-radius:3px;
  font-size:9px; font-weight:700; font-family:"Courier New",monospace;
  letter-spacing:0.5px; text-transform:uppercase; line-height:16px;
}
.sev-CRITICAL { background:rgba(239,68,68,0.15);  color:var(--critical); }
.sev-HIGH     { background:rgba(249,115,22,0.15); color:var(--high); }
.sev-MEDIUM   { background:rgba(234,179,8,0.15);  color:var(--medium); }
.sev-LOW      { background:rgba(34,197,94,0.15);  color:var(--low); }
.det-rule { background:rgba(59,130,246,0.18);  color:#93b4fd; }
.det-ml   { background:rgba(168,85,247,0.18);  color:#c4b5fd; }
.det-both { background:rgba(16,185,129,0.22);  color:#6ee7b7; }

/* ── Action bar ──────────────────────────────────────────── */
.action-bar {
  display:flex; align-items:center; gap:8px; padding:7px 12px;
  border-top:1px solid var(--border); flex-shrink:0; background:rgba(13,21,32,0.7);
}
.btn {
  padding:5px 13px; border-radius:4px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid transparent; font-family:inherit;
  transition:background .12s, box-shadow .12s, transform .08s; letter-spacing:0.2px;
}
.btn:active { transform:scale(0.96); }
.btn:disabled { opacity:0.3; cursor:not-allowed; }

.btn-sim   { color:var(--critical); border-color:rgba(239,68,68,0.4); background:transparent; }
.btn-sim:hover:not(:disabled) { background:rgba(239,68,68,0.08); box-shadow:0 0 10px rgba(239,68,68,0.18); }

.btn-pause { color:var(--medium); border-color:rgba(234,179,8,0.35); background:transparent; }
.btn-pause.paused { color:var(--accent); border-color:rgba(0,255,136,0.35); }

.btn-clr   { color:var(--muted); border-color:var(--border); background:transparent; }
.btn-clr:hover:not(:disabled) { background:rgba(255,255,255,0.04); color:var(--text); }

.action-status { font-size:10px; color:var(--muted); font-family:"Courier New",monospace; margin-left:auto; }

/* ── RIGHT COLUMN ────────────────────────────────────────── */
.col-right { display:grid; grid-template-rows:1fr 220px; overflow:hidden; }

/* ── Detail panel ────────────────────────────────────────── */
.detail-panel { overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:18px; }

/* Empty detail */
.detail-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:8px; color:var(--muted); text-align:center;
}
.detail-empty-glyph { font-size:44px; opacity:0.1; margin-bottom:12px;
  font-family:"Courier New",monospace; color:var(--accent); }
.detail-empty-title { font-size:14px; color:var(--muted); }
.detail-empty-sub   { font-size:11px; color:var(--muted); opacity:0.55; }
.detail-empty-hint  {
  margin-top:20px; font-family:"Courier New",monospace; font-size:9px;
  color:var(--muted); opacity:0.35; letter-spacing:1.5px; text-transform:uppercase;
}

/* Detail header */
.detail-header {
  display:flex; align-items:stretch; gap:14px;
  padding-bottom:16px; border-bottom:1px solid var(--border);
}
.detail-sev-bar { width:4px; border-radius:2px; flex-shrink:0; min-height:44px; }
.detail-hdr-body { flex:1; min-width:0; }
.detail-type {
  font-family:"Courier New",monospace; font-size:20px; font-weight:700;
  color:var(--text-hi); letter-spacing:1px; line-height:1.15; margin-bottom:8px;
}
.detail-badges { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* KV grid */
.kv-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(155px,1fr)); gap:10px 18px; }
.kv { display:flex; flex-direction:column; gap:2px; }
.kv-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); }
.kv-val { font-family:"Courier New",monospace; font-size:11px; color:var(--text); }

/* Section heading with line */
.sec-lbl {
  font-size:9px; text-transform:uppercase; letter-spacing:1.8px; color:var(--muted);
  display:flex; align-items:center; gap:10px;
}
.sec-lbl::after { content:''; flex:1; height:1px; background:var(--border); }

/* LLM insight card */
.insight-card {
  background:rgba(0,255,136,0.03); border:1px solid rgba(0,255,136,0.1);
  border-radius:6px; padding:14px 16px; font-size:13px; line-height:1.75;
  color:var(--text); position:relative;
}
.insight-card::before {
  content:'AI ASSESSMENT';
  position:absolute; top:-8px; left:12px; background:var(--bg);
  padding:0 6px; font-size:8px; font-weight:700; font-family:"Courier New",monospace;
  letter-spacing:1.5px; color:var(--accent); opacity:0.7;
}

/* SHAP bars */
.shap-list { display:flex; flex-direction:column; gap:9px; }
.shap-row  { display:grid; grid-template-columns:145px 1fr 48px; align-items:center; gap:10px; }
.shap-name {
  font-family:"Courier New",monospace; font-size:10px; color:var(--muted);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.shap-track { height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.shap-fill  { height:100%; border-radius:3px; min-width:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.shap-val   { font-family:"Courier New",monospace; font-size:10px; color:var(--muted); text-align:right; }
.shap-empty { font-size:11px; color:var(--muted); font-style:italic; opacity:0.5; }

/* ── Terminal ─────────────────────────────────────────────── */
.terminal { border-top:1px solid var(--border); display:flex; flex-direction:column;
  background:#050a08; font-family:"Courier New",monospace; font-size:11px; overflow:hidden; }
.term-hdr {
  display:flex; align-items:center; gap:8px; padding:5px 14px;
  background:#040806; border-bottom:1px solid rgba(0,255,65,0.1);
  color:#00ff41; font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; flex-shrink:0;
}
.term-badge { margin-left:auto; font-size:9px; opacity:0.35; letter-spacing:.5px; transition:opacity .3s; }
.term-badge.live { opacity:1; }
.term-body { flex:1; overflow-y:auto; padding:6px 14px; line-height:1.5; word-break:break-all; }
.log-line { white-space:pre-wrap; margin:0; }
.log-ts   { color:#00ff41; opacity:0.25; }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:22px; left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--surface-hi); border:1px solid var(--border); color:var(--text-hi);
  padding:7px 16px; border-radius:6px; font-size:12px;
  opacity:0; transition:opacity .18s,transform .18s;
  pointer-events:none; z-index:500; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div id="app">

<!-- Header -->
<header>
  <div class="logo"><span class="logo-glyph">◈</span>CyberIDS</div>
  <div class="h-sep"></div>
  <div class="h-stats">
    <div class="hstat"><span class="hstat-lbl">Total</span><span class="hstat-val" id="hv-total">0</span></div>
    <div class="hstat"><span class="hstat-lbl">Crit</span><span class="hstat-val" id="hv-critical">0</span></div>
    <div class="hstat"><span class="hstat-lbl">High</span><span class="hstat-val" id="hv-high">0</span></div>
    <div class="hstat"><span class="hstat-lbl">Med</span><span class="hstat-val" id="hv-medium">0</span></div>
    <div class="hstat"><span class="hstat-lbl">/min</span><span class="hstat-val" id="hv-apm">0</span></div>
  </div>
  <div class="live-badge offline" id="liveBadge">
    <span class="live-dot"></span>
    <span id="liveLabel">CONNECTING</span>
  </div>
  <span class="ws-status" id="wsStatus"></span>
</header>

<main>
  <!-- LEFT: Alert stream -->
  <div class="col-left">
    <div class="filter-bar">
      <span class="filter-lbl">Filter</span>
      <button class="filter-btn fb-all active"  data-sev="ALL">All</button>
      <button class="filter-btn fb-CRITICAL"    data-sev="CRITICAL">Crit</button>
      <button class="filter-btn fb-HIGH"        data-sev="HIGH">High</button>
      <button class="filter-btn fb-MEDIUM"      data-sev="MEDIUM">Med</button>
      <button class="filter-btn fb-LOW"         data-sev="LOW">Low</button>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <div class="alert-list" id="alertList" tabindex="0">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🛡</div>
        <p>No alerts detected</p>
        <p style="font-size:11px;opacity:.5;margin-top:4px">Monitoring in progress…</p>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-sim"   id="btnSimulate">⚡ Simulate</button>
      <button class="btn btn-pause" id="btnPause">⏸ Pause</button>
      <button class="btn btn-clr"   id="btnClear">✕ Clear</button>
      <span class="action-status" id="actionStatus"></span>
    </div>
  </div>

  <!-- RIGHT: Detail panel + Terminal -->
  <div class="col-right">
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">
        <div class="detail-empty-glyph">◈</div>
        <div class="detail-empty-title">No alert selected</div>
        <div class="detail-empty-sub">Select an alert from the stream to inspect</div>
        <div class="detail-empty-hint">↑ ↓ arrows · Enter · Esc to clear · P to pause</div>
      </div>
    </div>

    <div class="terminal">
      <div class="term-hdr">
        <span>▸</span> Pipeline Log
        <span class="term-badge" id="termBadge">connecting…</span>
      </div>
      <div class="term-body" id="termBody"></div>
    </div>
  </div>
</main>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  const SEV_COLOR = { CRITICAL:'#ef4444', HIGH:'#f97316', MEDIUM:'#eab308', LOW:'#22c55e' };
  const DET_CLS   = { rule_engine:'det-rule', ml:'det-ml', both:'det-both' };
  const DET_LBL   = { rule_engine:'Rule', ml:'ML', both:'Rule+ML' };

  /* ── State ─────────────────────────────────────── */
  const MAX_CARDS  = 300;
  let selectedId   = null;
  const alertMap   = new Map();
  let ws           = null;
  let wsDelay      = 1000;
  let activeFilter = 'ALL';
  let paused       = false;
  const pauseQueue = [];

  /* ── DOM helpers ───────────────────────────────── */
  function cel(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function txt(tag, cls, content) { const e = cel(tag, cls); e.textContent = content; return e; }
  function badge(cls, label) { return txt('span', 'badge ' + cls, label); }

  /* ── Formatting ─────────────────────────────────── */
  function fmtTime(iso) {
    try { return new Date(iso).toLocaleTimeString('en-US', { hour12:false }); }
    catch { return String(iso||'').slice(11,19)||'—'; }
  }
  function truncate(s, n) { const str = String(s||''); return str.length > n ? str.slice(0,n)+'…' : str; }

  /* ── Toast ─────────────────────────────────────── */
  function toast(msg, ms) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), ms||3000);
  }

  /* ── Status helpers ─────────────────────────────── */
  function setLive(state) {
    const b = document.getElementById('liveBadge');
    const l = document.getElementById('liveLabel');
    b.className = 'live-badge ' + (state === 'online' ? 'online' : 'offline');
    l.textContent = state === 'online' ? 'LIVE' : state === 'offline' ? 'OFFLINE' : 'RECONNECTING';
  }
  function setWsStatus(msg) { const e = document.getElementById('wsStatus'); if(e) e.textContent = msg; }
  function setActionStatus(msg) { const e = document.getElementById('actionStatus'); if(e) e.textContent = msg; }

  /* ── Stats ─────────────────────────────────────── */
  function applyStats(s) {
    document.getElementById('hv-total').textContent    = s.total    ?? 0;
    document.getElementById('hv-critical').textContent = s.critical ?? 0;
    document.getElementById('hv-high').textContent     = s.high     ?? 0;
    document.getElementById('hv-medium').textContent   = s.medium   ?? 0;
    document.getElementById('hv-apm').textContent      = typeof s.alerts_per_minute === 'number'
      ? Math.round(s.alerts_per_minute) : 0;
  }
  async function fetchStats() {
    try { const r = await fetch('/api/stats'); if(r.ok) applyStats(await r.json()); } catch {}
  }
  async function fetchHealth() {
    try {
      const r = await fetch('/api/health'); if(!r.ok) throw new Error();
      const h = await r.json(); setLive(h.pipeline ? 'online' : 'offline');
    } catch { setLive('offline'); }
  }

  /* ── Copy IP ─────────────────────────────────────── */
  function copyIp(ip) {
    if (!navigator.clipboard) { toast('Clipboard unavailable'); return; }
    navigator.clipboard.writeText(ip).then(
      () => toast('✓ Copied ' + ip),
      () => toast('Copy failed')
    );
  }

  /* ── Filter count ────────────────────────────────── */
  function updateFilterCount() {
    const list = document.getElementById('alertList');
    const total = alertMap.size;
    let visible = 0;
    for (const c of list.querySelectorAll('.alert-card')) {
      if (c.style.display !== 'none') visible++;
    }
    const el = document.getElementById('filterCount');
    if (el) el.textContent = activeFilter === 'ALL' ? total+' alerts' : visible+' / '+total;
  }

  /* ── Build alert card ─────────────────────────────── */
  function buildCard(alert, animate) {
    const sev  = alert.severity || 'LOW';
    const src  = alert.detection_source || 'rule_engine';

    const card = cel('div', 'alert-card' + (animate ? ' card-new' : ''));
    card.id = 'card-' + alert.alert_id;
    card.dataset.sev     = sev;
    card.dataset.alertId = alert.alert_id;
    if (activeFilter !== 'ALL' && sev !== activeFilter) card.style.display = 'none';

    // Severity bar
    card.appendChild(cel('div', 'sev-bar sev-bar-' + sev));

    // Card body
    const body = cel('div', 'card-body');

    // Row 1
    body.appendChild(badge('sev-'+sev+' card-sev', sev));
    body.appendChild(txt('div', 'card-type', alert.type || '—'));

    const right = cel('div', 'card-right');
    right.appendChild(badge(DET_CLS[src]||'det-rule', DET_LBL[src]||src));
    right.appendChild(txt('span', 'card-time', fmtTime(alert.timestamp)));
    body.appendChild(right);

    // Row 2
    const bot = cel('div', 'card-bottom');
    const ipEl = txt('span', 'card-ip', alert.src_ip || '—');
    ipEl.dataset.ip = alert.src_ip || '';
    ipEl.addEventListener('click', e => { e.stopPropagation(); copyIp(e.currentTarget.dataset.ip); });
    bot.appendChild(ipEl);

    if (alert.dst_ip) {
      bot.appendChild(txt('span', 'card-arrow', '→'));
      const dstEl = txt('span', 'card-ip', alert.dst_ip + ':' + (alert.dst_port||''));
      dstEl.dataset.ip = alert.dst_ip;
      dstEl.addEventListener('click', e => { e.stopPropagation(); copyIp(e.currentTarget.dataset.ip); });
      bot.appendChild(dstEl);
    }
    const expl = alert.llm_explanation || alert.rule_name || '';
    if (expl) bot.appendChild(txt('span', 'card-expl', truncate(expl, 55)));
    body.appendChild(bot);

    card.appendChild(body);
    card.addEventListener('click', () => selectAlert(alert.alert_id));
    return card;
  }

  /* ── Remove empty state ─────────────────────────── */
  function removeEmptyState() { const e = document.getElementById('emptyState'); if(e) e.remove(); }

  /* ── Insert alert ────────────────────────────────── */
  function _insertAlert(alert, animate) {
    alertMap.set(alert.alert_id, alert);
    const list = document.getElementById('alertList');
    list.prepend(buildCard(alert, animate));

    const cards = list.querySelectorAll('.alert-card');
    if (cards.length > MAX_CARDS) {
      const oldest = cards[cards.length - 1];
      const id = oldest.dataset.alertId;
      if (id) alertMap.delete(id);
      oldest.remove();
    }
    updateFilterCount();
    setActionStatus('Last: ' + fmtTime(alert.timestamp));
  }

  function prependAlert(alert, animate) {
    if (paused && animate) {
      pauseQueue.push(alert);
      const btn = document.getElementById('btnPause');
      if (btn) btn.textContent = '▶ Resume (' + pauseQueue.length + ')';
      return;
    }
    _insertAlert(alert, animate);
  }

  /* ── Select alert ────────────────────────────────── */
  function selectAlert(id) {
    if (selectedId) {
      const prev = document.getElementById('card-' + selectedId);
      if (prev) prev.classList.remove('selected');
    }
    selectedId = id;
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add('selected');
    const alert = alertMap.get(id);
    if (alert) renderDetail(alert);
  }

  /* ── Render detail panel ─────────────────────────── */
  function renderDetail(alert) {
    const panel = document.getElementById('detailPanel');
    while (panel.firstChild) panel.removeChild(panel.firstChild);

    const sev = alert.severity || 'LOW';
    const src = alert.detection_source || 'rule_engine';
    const col = SEV_COLOR[sev] || '#22c55e';

    // Header
    const hdr = cel('div', 'detail-header');
    const bar = cel('div', 'detail-sev-bar'); bar.style.background = col;
    hdr.appendChild(bar);

    const hdrBody = cel('div', 'detail-hdr-body');
    hdrBody.appendChild(txt('div', 'detail-type', alert.type || '—'));
    const badges = cel('div', 'detail-badges');
    badges.appendChild(badge('sev-'+sev, sev));
    badges.appendChild(badge(DET_CLS[src]||'det-rule', 'via '+(DET_LBL[src]||src)));
    if (typeof alert.anomaly_score === 'number')
      badges.appendChild(txt('span', 'kv-val', 'score: '+alert.anomaly_score.toFixed(3)));
    hdrBody.appendChild(badges);
    hdr.appendChild(hdrBody);
    panel.appendChild(hdr);

    // KV grid
    function kv(lbl, val) {
      const d = cel('div','kv');
      d.appendChild(txt('div','kv-lbl',lbl));
      d.appendChild(txt('div','kv-val',val));
      return d;
    }
    const grid = cel('div','kv-grid');
    grid.appendChild(kv('Alert ID',  (alert.alert_id||'').slice(0,16)+'…'));
    grid.appendChild(kv('Time',       new Date(alert.timestamp).toLocaleString()));
    grid.appendChild(kv('Source IP',  alert.src_ip||'—'));
    grid.appendChild(kv('Dest',       (alert.dst_ip||'—')+':'+(alert.dst_port||'—')));
    grid.appendChild(kv('Rule',       alert.rule_name||'—'));
    grid.appendChild(kv('Detection',  DET_LBL[src]||src));
    panel.appendChild(grid);

    // LLM explanation
    if (alert.llm_explanation) {
      panel.appendChild(txt('div','sec-lbl','AI Threat Assessment'));
      panel.appendChild(txt('div','insight-card', alert.llm_explanation));
    }

    // SHAP
    panel.appendChild(txt('div','sec-lbl','SHAP Feature Attribution'));
    const factors = Array.isArray(alert.shap_factors) ? alert.shap_factors.slice(0,5) : [];
    if (factors.length > 0) {
      const maxAbs = factors.reduce((m,f) => Math.max(m, Math.abs(f.shap_contribution||0)), 0.001);
      const shList = cel('div','shap-list');
      factors.forEach(f => {
        const row  = cel('div','shap-row');
        row.appendChild(txt('div','shap-name', f.feature||'—'));
        const track = cel('div','shap-track');
        const fill  = cel('div','shap-fill');
        fill.style.width      = '0%';
        fill.style.background = col;
        track.appendChild(fill);
        row.appendChild(track);
        row.appendChild(txt('div','shap-val', typeof f.value === 'number' ? f.value.toFixed(2) : '—'));
        shList.appendChild(row);
        requestAnimationFrame(() => {
          fill.style.width = (Math.abs(f.shap_contribution||0) / maxAbs * 100).toFixed(1) + '%';
        });
      });
      panel.appendChild(shList);
    } else {
      panel.appendChild(txt('p','shap-empty','No SHAP data — rule-based detection.'));
    }
  }

  /* ── Load initial alerts ─────────────────────────── */
  async function loadAlerts() {
    try {
      const r = await fetch('/api/alerts'); if(!r.ok) return;
      const data = await r.json();
      const alerts = data.alerts || [];
      if (alerts.length > 0) {
        removeEmptyState();
        for (let i = alerts.length-1; i >= 0; i--) _insertAlert(alerts[i], false);
        updateFilterCount();
      }
    } catch {}
  }

  /* ── WebSocket (alerts) ──────────────────────────── */
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    setWsStatus('connecting…');
    ws = new WebSocket(proto + '://' + location.host + '/ws/alerts');

    ws.addEventListener('open', () => {
      wsDelay = 1000; setWsStatus('● '+location.host); fetchHealth();
    });
    ws.addEventListener('message', evt => {
      let msg; try { msg = JSON.parse(evt.data); } catch { return; }
      if (!msg || msg.type === 'ping') return;
      removeEmptyState(); prependAlert(msg, true); fetchStats();
    });
    ws.addEventListener('close', () => {
      setLive('offline');
      const d = wsDelay; wsDelay = Math.min(wsDelay * 2, 30000);
      setWsStatus('reconnecting in ' + (d/1000|0) + 's…');
      setTimeout(connect, d);
    });
    ws.addEventListener('error', () => ws.close());
  }

  /* ── Filter ──────────────────────────────────────── */
  function applyFilter(sev) {
    activeFilter = sev;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sev === sev));
    const list = document.getElementById('alertList');
    for (const c of list.querySelectorAll('.alert-card'))
      c.style.display = (sev === 'ALL' || c.dataset.sev === sev) ? '' : 'none';
    updateFilterCount();
  }
  document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.sev)));

  /* ── Pause / Resume ──────────────────────────────── */
  document.getElementById('btnPause').addEventListener('click', () => {
    paused = !paused;
    const btn = document.getElementById('btnPause');
    if (paused) {
      btn.classList.add('paused'); btn.textContent = '▶ Resume';
    } else {
      btn.classList.remove('paused'); btn.textContent = '⏸ Pause';
      if (pauseQueue.length > 0) {
        removeEmptyState();
        while (pauseQueue.length > 0) _insertAlert(pauseQueue.shift(), false);
        fetchStats();
      }
    }
  });

  /* ── Keyboard navigation ─────────────────────────── */
  document.getElementById('alertList').addEventListener('keydown', e => {
    const cards = Array.from(document.querySelectorAll('.alert-card')).filter(c => c.style.display !== 'none');
    if (!cards.length) return;
    const idx = cards.findIndex(c => c.dataset.alertId === selectedId);

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = cards[idx < cards.length-1 ? idx+1 : 0];
      selectAlert(next.dataset.alertId); next.scrollIntoView({block:'nearest'});
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = cards[idx > 0 ? idx-1 : cards.length-1];
      selectAlert(prev.dataset.alertId); prev.scrollIntoView({block:'nearest'});
    } else if (e.key === 'Escape') {
      if (selectedId) {
        const c = document.getElementById('card-'+selectedId);
        if (c) c.classList.remove('selected');
        selectedId = null;
        const panel = document.getElementById('detailPanel');
        while (panel.firstChild) panel.removeChild(panel.firstChild);
        const emp = cel('div','detail-empty');
        emp.appendChild(txt('div','detail-empty-glyph','◈'));
        emp.appendChild(txt('div','detail-empty-title','No alert selected'));
        emp.appendChild(txt('div','detail-empty-sub','Select an alert from the stream to inspect'));
        emp.appendChild(txt('div','detail-empty-hint','↑ ↓ arrows · Enter · Esc to clear · P to pause'));
        panel.appendChild(emp);
      }
    } else if ((e.key === 'p' || e.key === 'P') && !e.ctrlKey) {
      document.getElementById('btnPause').click();
    }
  });

  /* ── Simulate attack ─────────────────────────────── */
  document.getElementById('btnSimulate').addEventListener('click', async () => {
    const btn = document.getElementById('btnSimulate');
    btn.disabled = true; btn.textContent = '↻ Injecting…';
    try {
      const r = await fetch('/api/simulate', {method:'POST'});
      const data = await r.json();
      r.ok ? toast('⚡ Attack sequence injected — '+data.count+' events')
           : toast('Error: '+(data.detail||'unknown'));
    } catch { toast('Network error — is the pipeline running?'); }
    finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = '⚡ Simulate'; }, 2500);
    }
  });

  /* ── Clear ───────────────────────────────────────── */
  document.getElementById('btnClear').addEventListener('click', () => {
    const list = document.getElementById('alertList');
    while (list.firstChild) list.removeChild(list.firstChild);
    alertMap.clear(); selectedId = null; pauseQueue.length = 0; paused = false;

    const emp = cel('div','empty-state'); emp.id = 'emptyState';
    emp.appendChild(txt('div','empty-icon','🛡'));
    emp.appendChild(txt('p','','Display cleared'));
    list.appendChild(emp);

    const panel = document.getElementById('detailPanel');
    while (panel.firstChild) panel.removeChild(panel.firstChild);
    const empD = cel('div','detail-empty');
    empD.appendChild(txt('div','detail-empty-glyph','◈'));
    empD.appendChild(txt('div','detail-empty-title','No alert selected'));
    panel.appendChild(empD);

    applyStats({total:0,critical:0,high:0,medium:0,alerts_per_minute:0});
    setActionStatus('Cleared');
    updateFilterCount();
    const p = document.getElementById('btnPause');
    if(p){p.classList.remove('paused');p.textContent='⏸ Pause';}
  });

  /* ── Pipeline terminal ───────────────────────────── */
  const MAX_LINES = 200;
  let termPinned = true, logWs = null, logWsDelay = 1000;

  function logColor(line) {
    if (/\] ERROR   |\] CRITICAL/.test(line)) return '#ef4444';
    if (/\] WARNING /.test(line) && line.includes('ALERT')) return '#ef4444';
    if (/\] WARNING /.test(line)) return '#fbbf24';
    if (/\] DEBUG   /.test(line)) return '#2d4a3e';
    return '#00ff41';
  }

  function addLogLine(text) {
    if (!text || text === '__ping__') return;
    const body = document.getElementById('termBody');
    const el = document.createElement('div'); el.className = 'log-line';
    const m = text.match(/^(\[\d{2}:\d{2}:\d{2}\])([\s\S]*)/);
    if (m) {
      const ts = document.createElement('span'); ts.className = 'log-ts'; ts.textContent = m[1];
      const rest = document.createElement('span'); rest.style.color = logColor(text); rest.textContent = m[2];
      el.appendChild(ts); el.appendChild(rest);
    } else { el.style.color = logColor(text); el.textContent = text; }
    body.appendChild(el);
    while (body.children.length > MAX_LINES) body.removeChild(body.firstChild);
    if (termPinned) body.scrollTop = body.scrollHeight;
  }

  function setTermBadge(live) {
    const b = document.getElementById('termBadge'); if(!b) return;
    b.textContent = live ? '● live' : '○ reconnecting…';
    b.classList.toggle('live', live);
  }

  function connectLogs() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    logWs = new WebSocket(proto + '://' + location.host + '/ws/logs');
    logWs.addEventListener('open',    () => { logWsDelay = 1000; setTermBadge(true); });
    logWs.addEventListener('message', e  => addLogLine(e.data));
    logWs.addEventListener('close',   () => {
      setTermBadge(false);
      const d = logWsDelay; logWsDelay = Math.min(logWsDelay * 2, 30000);
      setTimeout(connectLogs, d);
    });
    logWs.addEventListener('error', () => logWs.close());
  }

  document.getElementById('termBody').addEventListener('scroll', function () {
    termPinned = this.scrollTop + this.clientHeight >= this.scrollHeight - 24;
  });

  /* ── Boot ────────────────────────────────────────── */
  async function boot() {
    await Promise.all([fetchHealth(), loadAlerts(), fetchStats()]);
    connect();
    connectLogs();
    setInterval(fetchStats,  10000);
    setInterval(fetchHealth,  5000);
  }

  boot();
}());
</script>
</body>
</html>
