# Apply with: kubectl apply -f k8s/
# Namespace: cyber-ids
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline
  namespace: cyber-ids
  labels:
    app: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline
  template:
    metadata:
      labels:
        app: pipeline
    spec:
      containers:
        - name: pipeline
          image: cyber-ids-pipeline:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cyber-ids-config
          volumeMounts:
            - name: shared-data
              mountPath: /data
            - name: alerts-data
              mountPath: /data/alerts
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc
        - name: alerts-data
          persistentVolumeClaim:
            claimName: alerts-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-service
  namespace: cyber-ids
spec:
  selector:
    app: pipeline
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
