# Apply with: kubectl apply -f k8s/
# Namespace: cyber-ids
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: cyber-ids
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: cyber-ids-pipeline:latest
          imagePullPolicy: Never
          # Override CMD to run only the FastAPI dashboard, not the full pipeline
          command: ["python", "-m", "uvicorn", "dashboard.api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cyber-ids-config
          volumeMounts:
            - name: alerts-data
              mountPath: /data/alerts
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: alerts-data
          persistentVolumeClaim:
            claimName: alerts-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: cyber-ids
spec:
  selector:
    app: dashboard
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
