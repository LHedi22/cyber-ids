# Apply with: kubectl apply -f k8s/
# Namespace: cyber-ids
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: cyber-ids
  labels:
    app: target-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
    spec:
      containers:
        - name: target-app
          image: cyber-ids-target:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: target-app-service
  namespace: cyber-ids
spec:
  selector:
    app: target-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
